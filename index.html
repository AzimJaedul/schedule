<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Work Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111113;
  --surface:#1a1a1d;
  --surface2:#222226;
  --surface3:#2a2a2e;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#f0ede8;
  --text2:#888480;
  --text3:#4a4845;
  --accent:#d4b87a;
  --high:#e05a3a;
  --high-bg:rgba(224,90,58,0.12);
  --med:#d4a024;
  --med-bg:rgba(212,160,36,0.12);
  --low:#4aaa72;
  --low-bg:rgba(74,170,114,0.12);
}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.layout{display:flex;flex-direction:column;min-height:100vh}

/* ---- HEADER ---- */
.header{padding:1.5rem 2rem 0;background:var(--bg)}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.25rem}
.title-block h1{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,38px);font-weight:700;color:var(--text);line-height:1}
.title-block h1 span{color:var(--accent)}
.sub{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-top:5px}

/* ---- TABS ---- */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border2)}
.tab{padding:10px 24px;font-size:13px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:'Lato',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ---- CONTENT ---- */
.tab-content{display:none;padding:1.5rem 2rem;flex:1}
.tab-content.active{display:block}

/* ---- STATS ROW ---- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:6px;font-weight:700}
.stat-val{font-size:26px;font-weight:700;font-family:'Playfair Display',serif;color:var(--text)}
.stat-val.gold{color:var(--accent)}
.stat-val.red{color:var(--high)}

/* ---- ADD FORM ---- */
.add-form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.add-form input,.add-form select{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);font-family:'Lato',sans-serif;outline:none;transition:border-color 0.15s}
.add-form input{flex:1;min-width:180px}
.add-form input::placeholder{color:var(--text3)}
.add-form input:focus,.add-form select:focus{border-color:var(--accent)}
.add-form select option{background:#1a1a1d}
.addbtn{padding:9px 20px;border-radius:8px;background:var(--accent);color:#111;border:none;font-size:13px;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity 0.15s,transform 0.1s}
.addbtn:hover{opacity:0.85}
.addbtn:active{transform:scale(0.97)}

/* ---- SECTION LABEL ---- */
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);font-weight:700;margin-bottom:0.75rem}

/* ---- FOCUS LIST ---- */
.focus-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
.focus-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.focus-item:last-child{border-bottom:none}
.focus-num{font-family:'Playfair Display',serif;font-size:14px;color:var(--accent);min-width:18px}
.focus-title{flex:1;font-size:13px;color:var(--text)}
.focus-badges{display:flex;gap:5px;align-items:center}
.focus-empty{padding:1.25rem;text-align:center;color:var(--text3);font-size:13px}

/* ---- KANBAN ---- */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:700px){.kanban{grid-template-columns:1fr}}
.kol{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;min-height:200px}
.kol.drag-over{border-color:var(--accent);background:var(--surface2)}
.kol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kol-name{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);font-weight:700}
.kol-count{font-size:11px;background:var(--surface3);color:var(--text3);border-radius:20px;padding:2px 8px}
.kol-empty{text-align:center;color:var(--text3);font-size:12px;padding:1.5rem 0}

/* ---- TASK CARD ---- */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid transparent;cursor:grab;animation:fadeUp 0.18s ease;transition:background 0.15s,border-color 0.15s}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card:hover{background:var(--surface3)}
.card:active{cursor:grabbing}
.card.is-done{opacity:0.38}
.card.is-done .card-title{text-decoration:line-through}
.card.pri-high{border-left-color:var(--high)}
.card.pri-medium{border-left-color:var(--med)}
.card.pri-low{border-left-color:var(--low)}
.card-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px}
.chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.chk.on{background:var(--low);border-color:var(--low)}
.chk.on::after{content:'✓';font-size:9px;color:#fff;font-weight:900}
.card-title{font-size:13px;font-weight:400;color:var(--text);flex:1;line-height:1.4;word-break:break-word}
.card-meta{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:0.03em}
.b-high{background:var(--high-bg);color:var(--high)}
.b-medium{background:var(--med-bg);color:var(--med)}
.b-low{background:var(--low-bg);color:var(--low)}
.b-time{background:rgba(212,184,122,0.12);color:var(--accent)}
.b-due{background:var(--surface3);color:var(--text2)}
.b-today{background:var(--med-bg);color:var(--med)}
.b-late{background:var(--high-bg);color:var(--high)}
.card-actions{display:flex;gap:5px}
.act{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Lato',sans-serif;transition:all 0.15s}
.act:hover{background:var(--surface3);color:var(--text)}
.act.del{color:var(--high);border-color:rgba(224,90,58,0.2)}
.act.del:hover{background:var(--high-bg)}

/* ---- TIMER ---- */
.timer-strip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap}
.timer-name{flex:1;font-size:13px;color:var(--text2);min-width:120px}
.timer-name strong{color:var(--text)}
.timer-dig{font-family:'Playfair Display',serif;font-size:30px;min-width:90px;text-align:center;color:var(--accent);letter-spacing:0.04em}
.timer-dig.on{color:var(--high)}
.tbtn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s;letter-spacing:0.04em}
.tbtn:hover{background:var(--surface3);color:var(--text)}
.tbtn.go{background:var(--high);color:#fff;border-color:var(--high)}
.tbtn.go:hover{opacity:0.85}
.timer-idle{color:var(--text3);font-size:13px;font-style:italic}

/* ---- WEEK VIEW ---- */
.week-head-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.week-range{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
.navbtn{width:30px;height:30px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.navbtn:hover{background:var(--surface2)}
.todaybtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:'Lato',sans-serif}
.todaybtn:hover{background:var(--surface2);color:var(--text)}
.week-add-form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.week-add-form input,.week-add-form select{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'Lato',sans-serif;outline:none;transition:border-color 0.15s}
.week-add-form input{flex:1;min-width:160px}
.week-add-form input::placeholder{color:var(--text3)}
.week-add-form input:focus,.week-add-form select:focus{border-color:var(--accent)}
.week-add-form select option{background:#1a1a1d}

.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:900px){.days-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.days-grid{grid-template-columns:repeat(2,1fr)}}
.day-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.day-col.is-today{border-color:rgba(212,184,122,0.35)}
.day-head{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface2)}
.day-col.is-today .day-head{background:rgba(212,184,122,0.06)}
.day-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--text)}
.day-col.is-today .day-name{color:var(--accent)}
.day-date-sub{font-size:11px;color:var(--text3);margin-top:2px}
.day-prog{height:2px;background:var(--border2);margin-top:8px;border-radius:1px;overflow:hidden}
.day-prog-fill{height:100%;background:var(--low);border-radius:1px;transition:width 0.4s}
.day-tasks{padding:8px}
.day-task{background:var(--surface2);border-radius:6px;padding:8px 10px;margin-bottom:6px;border-left:3px solid transparent;animation:fadeUp 0.15s ease;cursor:pointer;transition:background 0.15s}
.day-task:hover{background:var(--surface3)}
.day-task.is-done{opacity:0.35}
.day-task.is-done .dt-title{text-decoration:line-through}
.day-task.pri-high{border-left-color:var(--high)}
.day-task.pri-medium{border-left-color:var(--med)}
.day-task.pri-low{border-left-color:var(--low)}
.dt-top{display:flex;align-items:flex-start;gap:6px}
.dt-chk{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.dt-chk.on{background:var(--low);border-color:var(--low)}
.dt-chk.on::after{content:'✓';font-size:8px;color:#fff;font-weight:900}
.dt-title{font-size:12px;color:var(--text);flex:1;line-height:1.35;word-break:break-word}
.dt-meta{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.dt-del{font-size:10px;margin-top:5px;padding:2px 6px;border-radius:4px;border:1px solid rgba(224,90,58,0.2);background:transparent;color:var(--high);cursor:pointer;font-family:'Lato',sans-serif;transition:all 0.15s}
.dt-del:hover{background:var(--high-bg)}
.day-empty{text-align:center;color:var(--text3);font-size:12px;padding:1.25rem 0}
</style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div class="header-top">
      <div class="title-block">
        <h1>My Work <span>Planner</span></h1>
        <div class="sub" id="todayFull"></div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('today',this)">Today</button>
      <button class="tab" onclick="switchTab('week',this)">This Week</button>
    </div>
  </div>

  <!-- ===== TODAY TAB ===== -->
  <div class="tab-content active" id="tab-today">

    <div class="stats" id="todayStats"></div>

    <div class="add-form">
      <input type="text" id="tTitle" placeholder="What needs to be done today?" />
      <select id="tPri">
        <option value="high">🔴 High</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
      <select id="tTime">
        <option value="">No time</option>
        <option>7:00 AM</option><option>7:30 AM</option>
        <option>8:00 AM</option><option>8:30 AM</option>
        <option>9:00 AM</option><option>9:30 AM</option>
        <option>10:00 AM</option><option>10:30 AM</option>
        <option>11:00 AM</option><option>11:30 AM</option>
        <option>12:00 PM</option><option>12:30 PM</option>
        <option>1:00 PM</option><option>1:30 PM</option>
        <option>2:00 PM</option><option>2:30 PM</option>
        <option>3:00 PM</option><option>3:30 PM</option>
        <option>4:00 PM</option><option>4:30 PM</option>
        <option>5:00 PM</option><option>5:30 PM</option>
        <option>6:00 PM</option>
      </select>
      <button class="addbtn" onclick="addTodayTask()">+ Add task</button>
    </div>

    <div class="timer-strip">
      <div class="timer-name" id="timerName"><span class="timer-idle">Click ▶ Start on a task to begin your focus timer</span></div>
      <div class="timer-dig" id="timerDig">00:00</div>
      <button class="tbtn go" id="tBtn1" style="display:none" onclick="timerToggle()">START</button>
      <button class="tbtn" id="tBtn2" style="display:none" onclick="timerStop()">✕ Stop</button>
    </div>

    <div class="sec-label">Today's focus — top tasks to tackle first</div>
    <div class="focus-list" id="focusList"></div>

    <div class="sec-label" style="margin-top:1.25rem">Task board</div>
    <div class="kanban" id="kanban"></div>

  </div>

  <!-- ===== WEEK TAB ===== -->
  <div class="tab-content" id="tab-week">

    <div class="week-head-row">
      <button class="navbtn" onclick="changeWeek(-1)">&#8592;</button>
      <div class="week-range" id="weekRange"></div>
      <button class="navbtn" onclick="changeWeek(1)">&#8594;</button>
      <button class="todaybtn" onclick="goToday()">Today</button>
    </div>

    <div class="week-add-form">
      <input type="text" id="wTitle" placeholder="Add a task..." />
      <select id="wDay">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
      </select>
      <select id="wPri">
        <option value="high">🔴 High</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
      <select id="wTime">
        <option value="">No time</option>
        <option>8:00 AM</option><option>8:30 AM</option>
        <option>9:00 AM</option><option>9:30 AM</option>
        <option>10:00 AM</option><option>10:30 AM</option>
        <option>11:00 AM</option><option>11:30 AM</option>
        <option>12:00 PM</option><option>12:30 PM</option>
        <option>1:00 PM</option><option>1:30 PM</option>
        <option>2:00 PM</option><option>2:30 PM</option>
        <option>3:00 PM</option><option>3:30 PM</option>
        <option>4:00 PM</option><option>4:30 PM</option>
        <option>5:00 PM</option><option>5:30 PM</option>
      </select>
      <button class="addbtn" onclick="addWeekTask()">+ Add</button>
    </div>

    <div class="days-grid" id="daysGrid"></div>

  </div>
</div>

<script>
// ---- HELPERS ----
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const PRI = {high:0,medium:1,low:2};

function todayDayIdx(){ const d=new Date().getDay(); return d===0?-1:d-1; }

function getMonday(offset){
  const d=new Date(), day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  const m=new Date(d); m.setDate(diff+offset*7); m.setHours(0,0,0,0); return m;
}
function weekDates(offset){
  const m=getMonday(offset);
  return Array.from({length:5},(_,i)=>{ const d=new Date(m); d.setDate(d.getDate()+i); return d; });
}
function isCurrentWeek(offset){ return getMonday(offset).toDateString()===getMonday(0).toDateString(); }

// ---- DATA ----
let weekOffset=0;

// Use in-memory storage only (no localStorage — sandbox blocks it)
let tasks = [
  {id:1,title:'Plan the week',scope:'today',day:todayDayIdx()<0?0:todayDayIdx(),pri:'high',time:'9:00 AM',status:'todo',done:false},
  {id:2,title:'Reply to emails',scope:'today',day:todayDayIdx()<0?0:todayDayIdx(),pri:'medium',time:'10:00 AM',status:'todo',done:false},
  {id:3,title:'Team check-in',scope:'week',day:1,pri:'medium',time:'11:00 AM',status:'todo',done:false},
  {id:4,title:'Finish weekly report',scope:'week',day:4,pri:'high',time:'4:00 PM',status:'todo',done:false},
];

// ---- TIMER ----
let timerId=null, timerSecs=0, timerRunning=false, timerInterval=null;
function timerStart(id){
  clearInterval(timerInterval); timerId=id; timerSecs=0; timerRunning=true;
  timerInterval=setInterval(()=>{timerSecs++;renderTimer();},1000);
  renderTimer(); renderKanban();
}
function timerToggle(){
  timerRunning=!timerRunning;
  if(timerRunning) timerInterval=setInterval(()=>{timerSecs++;renderTimer();},1000);
  else clearInterval(timerInterval);
  renderTimer();
}
function timerStop(){ clearInterval(timerInterval); timerRunning=false; timerId=null; timerSecs=0; renderTimer(); renderKanban(); }
function pad(n){return String(n).padStart(2,'0');}
function fmtSecs(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return h>0?`${pad(h)}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`; }
function renderTimer(){
  const dig=document.getElementById('timerDig'), name=document.getElementById('timerName');
  const b1=document.getElementById('tBtn1'), b2=document.getElementById('tBtn2');
  if(!timerId){ dig.textContent='00:00'; dig.className='timer-dig'; name.innerHTML='<span class="timer-idle">Click ▶ Start on a task to begin your focus timer</span>'; b1.style.display='none'; b2.style.display='none'; return; }
  const t=tasks.find(t=>t.id==timerId);
  name.innerHTML=t?`Working on: <strong>${t.title}</strong>`:'';
  dig.textContent=fmtSecs(timerSecs); dig.className='timer-dig'+(timerRunning?' on':'');
  b1.style.display='inline-block'; b1.textContent=timerRunning?'PAUSE':'RESUME'; b1.className=timerRunning?'tbtn':'tbtn go';
  b2.style.display='inline-block';
}

// ---- TODAY TASKS ----
function todayTasks(){ 
  const idx=todayDayIdx();
  return tasks.filter(t=>t.scope==='today'||(t.scope==='week'&&parseInt(t.day)===idx));
}
function sortedForToday(arr){ return [...arr].sort((a,b)=>{ if(!a.done&&b.done)return -1; if(a.done&&!b.done)return 1; return PRI[a.pri]-PRI[b.pri]; }); }

// ✅ FIX: addTodayTask — clear input first, then add, then call renderAll (which includes renderWeek)
function addTodayTask(){
  const input = document.getElementById('tTitle');
  const title = input.value.trim();
  if(!title) return;
  const idx = todayDayIdx()<0 ? 0 : todayDayIdx();
  tasks.unshift({
    id: Date.now(),
    title,
    scope: 'today',
    day: idx,
    pri: document.getElementById('tPri').value,
    time: document.getElementById('tTime').value,
    status: 'todo',
    done: false
  });
  input.value = '';
  renderAll(); // ✅ renderAll now calls renderWeek internally
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('tTitle').addEventListener('keydown',e=>{if(e.key==='Enter')addTodayTask();});
  document.getElementById('wTitle').addEventListener('keydown',e=>{if(e.key==='Enter')addWeekTask();});
  document.getElementById('todayFull').textContent=new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
});

// ✅ FIX: addWeekTask — clear input first, then add, then call renderAll
function addWeekTask(){
  const input = document.getElementById('wTitle');
  const title = input.value.trim();
  if(!title) return;
  tasks.push({
    id: Date.now(),
    title,
    scope: 'week',
    day: parseInt(document.getElementById('wDay').value),
    pri: document.getElementById('wPri').value,
    time: document.getElementById('wTime').value,
    status: 'todo',
    done: false
  });
  input.value = '';
  renderAll(); // ✅ single call updates everything, including the week grid
}

function changeWeek(d){ weekOffset+=d; renderWeek(); }
function goToday(){ weekOffset=0; renderWeek(); }

// ---- TOGGLE / DELETE ----
function toggleDone(id){ const t=tasks.find(t=>t.id==id); if(t){t.done=!t.done; if(t.done&&t.status!=='done')t.status='done'; if(!t.done&&t.status==='done')t.status='todo'; renderAll(); } }
function setStatus(id,s){ const t=tasks.find(t=>t.id==id); if(t){t.status=s; if(s==='done')t.done=true; renderAll(); } }
function deleteTask(id){ if(!confirm('Delete this task?'))return; tasks=tasks.filter(t=>t.id!=id); if(timerId==id)timerStop(); renderAll(); }

// ---- TIME BADGE ----
function timeBadge(t){ return t.time?`<span class="badge b-time">${t.time}</span>`:''; }

// ---- RENDER TODAY STATS ----
function renderTodayStats(){
  const tt=todayTasks();
  const total=tt.length, done=tt.filter(t=>t.done).length, high=tt.filter(t=>t.pri==='high'&&!t.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('todayStats').innerHTML=
    `<div class="stat"><div class="stat-lbl">Today's tasks</div><div class="stat-val">${total}</div></div>`+
    `<div class="stat"><div class="stat-lbl">Completed</div><div class="stat-val gold">${pct}%</div></div>`+
    `<div class="stat"><div class="stat-lbl">Remaining</div><div class="stat-val">${total-done}</div></div>`+
    `<div class="stat"><div class="stat-lbl">High priority</div><div class="stat-val red">${high}</div></div>`;
}

// ---- RENDER FOCUS LIST ----
function renderFocus(){
  const active=sortedForToday(todayTasks().filter(t=>!t.done)).slice(0,5);
  const fl=document.getElementById('focusList');
  if(!active.length){ fl.innerHTML='<div class="focus-empty">All done — great work! 🎉</div>'; return; }
  fl.innerHTML=active.map((t,i)=>`
    <div class="focus-item">
      <span class="focus-num">${i+1}</span>
      <span class="focus-title">${t.title}</span>
      <div class="focus-badges">
        <span class="badge b-${t.pri}">${t.pri}</span>
        ${timeBadge(t)}
      </div>
    </div>`).join('');
}

// ---- RENDER KANBAN ----
let dragId=null;
function renderKanban(){
  const cols=[{key:'todo',label:'To do'},{key:'inprogress',label:'In progress'},{key:'done',label:'Done'}];
  const tt=todayTasks();
  const kb=document.getElementById('kanban'); kb.innerHTML='';
  cols.forEach(({key,label})=>{
    const colTasks=tt.filter(t=>t.status===key).sort((a,b)=>PRI[a.pri]-PRI[b.pri]);
    const col=document.createElement('div'); col.className='kol';
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');setStatus(dragId,key);});
    col.innerHTML=`<div class="kol-head"><span class="kol-name">${label}</span><span class="kol-count">${colTasks.length}</span></div>`;
    if(!colTasks.length){ col.innerHTML+=`<div class="kol-empty">No tasks here</div>`; }
    colTasks.forEach(t=>{
      const card=document.createElement('div');
      card.className=`card pri-${t.pri}${t.done?' is-done':''}${timerId==t.id?' is-active':''}`;
      card.draggable=true; card.dataset.id=t.id;
      card.addEventListener('dragstart',()=>dragId=t.id);
      let actions='';
      if(key!=='inprogress') actions+=`<button class="act" onclick="setStatus(${t.id},'inprogress')">Start</button>`;
      if(key!=='done') actions+=`<button class="act" onclick="setStatus(${t.id},'done');toggleDone(${t.id})">Done ✓</button>`;
      if(key==='done') actions+=`<button class="act" onclick="setStatus(${t.id},'todo')">Undo</button>`;
      actions+=`<button class="act" onclick="timerStart(${t.id})">▶ ${timerId==t.id?'Running':'Timer'}</button>`;
      actions+=`<button class="act del" onclick="deleteTask(${t.id})">Delete</button>`;
      card.innerHTML=`
        <div class="card-top">
          <div class="chk${t.done?' on':''}" onclick="toggleDone(${t.id})"></div>
          <div class="card-title">${t.title}</div>
        </div>
        <div class="card-meta">
          <span class="badge b-${t.pri}">${t.pri}</span>
          ${timeBadge(t)}
        </div>
        <div class="card-actions">${actions}</div>`;
      col.appendChild(card);
    });
    kb.appendChild(col);
  });
}

// ---- RENDER WEEK ----
function renderWeek(){
  const dates=weekDates(weekOffset);
  const todayIdx=isCurrentWeek(weekOffset)?todayDayIdx():-1;
  const mon=dates[0],fri=dates[4];
  document.getElementById('weekRange').textContent=
    mon.toLocaleDateString('en-AU',{month:'short',day:'numeric'})+' – '+fri.toLocaleDateString('en-AU',{month:'short',day:'numeric',year:'numeric'});
  if(isCurrentWeek(weekOffset)&&todayIdx>=0) document.getElementById('wDay').value=todayIdx;

  const grid=document.getElementById('daysGrid'); grid.innerHTML='';
  dates.forEach((date,i)=>{
    const isToday=i===todayIdx;
    const dayTasks=tasks.filter(t=>parseInt(t.day)===i&&t.scope==='week').sort((a,b)=>{ if(!a.done&&b.done)return -1;if(a.done&&!b.done)return 1; return PRI[a.pri]-PRI[b.pri]; });
    const extra=isToday?tasks.filter(t=>t.scope==='today'):[];
    const all=[...dayTasks,...extra].sort((a,b)=>PRI[a.pri]-PRI[b.pri]);
    const done=all.filter(t=>t.done).length;
    const pct=all.length?Math.round(done/all.length*100):0;

    const col=document.createElement('div'); col.className='day-col'+(isToday?' is-today':'');
    col.innerHTML=`<div class="day-head">
      <div class="day-name">${DAYS[i]}</div>
      <div class="day-date-sub">${date.toLocaleDateString('en-AU',{day:'numeric',month:'short'})} · ${all.length} task${all.length!==1?'s':''}</div>
      <div class="day-prog"><div class="day-prog-fill" style="width:${pct}%"></div></div>
    </div>`;
    const dtasks=document.createElement('div'); dtasks.className='day-tasks';
    if(!all.length){ dtasks.innerHTML='<div class="day-empty">No tasks</div>'; }
    all.forEach(t=>{
      const dt=document.createElement('div');
      dt.className=`day-task pri-${t.pri}${t.done?' is-done':''}`;
      dt.innerHTML=`<div class="dt-top">
        <div class="dt-chk${t.done?' on':''}" onclick="toggleDone(${t.id})"></div>
        <div class="dt-title">${t.title}</div>
      </div>
      <div class="dt-meta">
        <span class="badge b-${t.pri}">${t.pri}</span>
        ${t.time?`<span class="badge b-time">${t.time}</span>`:''}
      </div>
      <button class="dt-del" onclick="deleteTask(${t.id})">Delete</button>`;
      dtasks.appendChild(dt);
    });
    col.appendChild(dtasks); grid.appendChild(col);
  });
}

// ---- TABS ----
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='week') renderWeek();
}

// ✅ FIX: renderAll now ALWAYS calls renderWeek too — both views stay in sync
function renderAll(){
  renderTodayStats();
  renderFocus();
  renderKanban();
  renderTimer();
  renderWeek(); // ✅ keeps week view in sync on every update
}

// Initial render
renderAll();
// Set header date on load
document.getElementById('todayFull').textContent=new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
</script>
